# Sentinel Data Generator - Example Configuration
# Copy this file to config/config.yaml and fill in your values.
# NEVER commit config.yaml with real credentials.

# Azure Log Analytics / Data Collection settings
# These can also be set via environment variables:
#   SENTINEL_DCE_ENDPOINT  → overrides azure.dce_endpoint
#   SENTINEL_DCR_ID        → overrides azure.dcr_id
#   SENTINEL_STREAM_NAME   → overrides azure.stream_name
azure:
  dce_endpoint: "https://<your-dce>.<region>.ingest.monitor.azure.com"
  dcr_id: "dcr-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  stream_name: "Custom-SecurityEventDemo_CL"

# Output target: log_analytics | file | stdout
output:
  type: stdout
  # For file output:
  # file_path: output/events.json
  # file_format: json  # json or csv

# Global generation settings
generation:
  count: 50             # Default number of events per scenario
  time_range:
    start: "2025-06-15T00:00:00Z"
    end: "2025-06-16T00:00:00Z"
  seed: null            # Optional random seed for reproducibility

# Scenarios to simulate
# Each scenario maps to a registered generator via log_type.
# Supported log_type values: security_event
# Coming soon: signin_logs, syslog, common_security_log
scenarios:
  - name: brute_force_login
    log_type: security_event
    stream_name: "Custom-SecurityEventDemo_CL"
    description: "Simulate brute-force login attempts against a Windows server"
    count: 50
    parameters:
      target_host: "DC01.contoso.com"
      target_account: "admin"
      source_ip: "203.0.113.50"
      event_ids: [4625, 4625, 4625, 4625, 4624]  # 4 failures then 1 success

  - name: privilege_escalation
    log_type: security_event
    stream_name: "Custom-SecurityEventDemo_CL"
    description: "Simulate privilege escalation — new account creation and special logon"
    count: 20
    parameters:
      target_host: "DC02.contoso.com"
      target_account: "svc_backup"
      event_ids: [4720, 4672, 4624]

  # CommonSecurityLog scenarios - ingest to NATIVE CommonSecurityLog table
  - name: firewall_traffic
    log_type: common_security_log_native
    stream_name: "Custom-CommonSecurityLogNative"
    description: "Simulate mixed firewall traffic (allow/deny)"
    count: 100
    parameters:
      vendor: "Palo Alto Networks"

  - name: ids_intrusion_detection
    log_type: common_security_log_native
    stream_name: "Custom-CommonSecurityLogNative"
    description: "Simulate IDS alerts and intrusion attempts"
    count: 30
    parameters:
      event_type: "ids_alert"
      threat_actor_ip: true

  - name: threat_intel_matches
    log_type: common_security_log_native
    stream_name: "Custom-CommonSecurityLogNative"
    description: "Simulate threat intelligence IOC matches"
    count: 20
    parameters:
      event_type: "threat_intelligence"
      threat_actor_ip: true

  - name: ubiquiti_firewall_traffic
    log_type: common_security_log_native
    stream_name: "Custom-CommonSecurityLogNative"
    description: "Simulate Ubiquiti UniFi firewall traffic (allow/deny, IDS, VPN)"
    count: 60
    parameters:
      vendor: "Ubiquiti"

  - name: firewall_deny_scan
    log_type: common_security_log_native
    stream_name: "Custom-CommonSecurityLogNative"
    description: "Simulate high-volume firewall denies from single attacker"
    count: 60
    parameters:
      vendor: "Palo Alto Networks"
      event_type: "firewall_deny"
      source_ip: "198.51.100.50"

  - name: ubiquiti_port_scan
    log_type: common_security_log_native
    stream_name: "Custom-CommonSecurityLogNative"
    description: "Simulate Ubiquiti port scan — high-volume denies from single source"
    count: 30
    parameters:
      vendor: "Ubiquiti"
      event_type: "firewall_deny"
      source_ip: "203.0.113.55"

  - name: ubiquiti_ids_vpn
    log_type: common_security_log_native
    stream_name: "Custom-CommonSecurityLogNative"
    description: "Simulate Ubiquiti IDS alerts and VPN connections from threat actor"
    count: 30
    parameters:
      vendor: "Ubiquiti"
      source_ip: "203.0.113.55"

  # SigninLogs scenarios - ingest to custom SigninLogDemo_CL table
  # (Native SigninLogs table is protected - only Entra ID can write to it)
  - name: suspicious_signins
    log_type: signin_logs
    stream_name: "Custom-SigninLogDemo_CL"
    description: "Simulate suspicious Entra ID sign-ins from risky locations"
    count: 50
    parameters:
      risky_locations: true
      failure_rate: 0.3

  - name: brute_force_aad
    log_type: signin_logs
    stream_name: "Custom-SigninLogDemo_CL"
    description: "Simulate brute-force attacks against Entra ID accounts"
    count: 30
    parameters:
      target_user: "admin@contoso.com"
      attack_type: "brute_force"

  - name: credential_stuffing
    log_type: signin_logs
    stream_name: "Custom-SigninLogDemo_CL"
    description: "Simulate credential stuffing attack (many users, same password)"
    count: 40
    parameters:
      attack_type: "credential_stuffing"

  # Syslog scenarios - ingest to custom SyslogDemo_CL table
  # (Native Syslog table requires specific agent-based ingestion)
  - name: ssh_brute_force
    log_type: syslog
    stream_name: "Custom-SyslogDemo_CL"
    description: "Simulate SSH brute-force attacks against Linux servers"
    count: 80
    parameters:
      event_type: "ssh_failure"
      target_host: "web-server-01.contoso.local"
      attacker_ip: "203.0.113.100"

  - name: linux_sudo_abuse
    log_type: syslog
    stream_name: "Custom-SyslogDemo_CL"
    description: "Simulate failed sudo attempts and privilege escalation"
    count: 40
    parameters:
      event_type: "sudo_failure"
      target_host: "app-server-01.contoso.local"

  - name: service_anomalies
    log_type: syslog
    stream_name: "Custom-SyslogDemo_CL"
    description: "Simulate service start/stop and failure events"
    count: 40
    parameters:
      event_type: "service_failure"
      target_host: "app-server-01.contoso.local"

  # ========================================================================
  # AWS CloudTrail scenarios - ingest to custom AWSCloudTrailDemo_CL table
  # ========================================================================
  - name: aws_iam_credential_abuse
    log_type: aws_cloudtrail
    stream_name: "Custom-AWSCloudTrailDemo_CL"
    description: "Simulate AWS IAM abuse — new users, access keys, policy attachments"
    count: 30
    parameters:
      event_type: "iam_abuse"
      source_ip: "198.51.100.10"
      target_account: "123456789012"

  - name: aws_s3_exfiltration
    log_type: aws_cloudtrail
    stream_name: "Custom-AWSCloudTrailDemo_CL"
    description: "Simulate S3 data exfiltration — bucket enumeration and mass object download"
    count: 40
    parameters:
      event_type: "s3_exfiltration"
      source_ip: "198.51.100.11"

  - name: aws_security_tampering
    log_type: aws_cloudtrail
    stream_name: "Custom-AWSCloudTrailDemo_CL"
    description: "Simulate disabling CloudTrail, deleting flow logs, opening security groups"
    count: 25
    parameters:
      event_type: "security_tampering"

  - name: aws_compute_abuse
    log_type: aws_cloudtrail
    stream_name: "Custom-AWSCloudTrailDemo_CL"
    description: "Simulate launching expensive GPU instances in unusual regions"
    count: 15
    parameters:
      event_type: "compute_abuse"

  - name: aws_brute_force_console
    log_type: aws_cloudtrail
    stream_name: "Custom-AWSCloudTrailDemo_CL"
    description: "Simulate brute-force AWS Console login attempts"
    count: 50
    parameters:
      event_type: "credential_brute_force"
      source_ip: "203.0.113.90"

  # ========================================================================
  # GCP Audit Logs scenarios - ingest to custom GCPAuditLogsDemo_CL table
  # ========================================================================
  - name: gcp_iam_abuse
    log_type: gcp_audit_logs
    stream_name: "Custom-GCPAuditLogsDemo_CL"
    description: "Simulate GCP IAM abuse — service account keys, overly permissive policies"
    count: 25
    parameters:
      event_type: "iam_abuse"
      source_ip: "198.51.100.30"
      target_project: "contoso-prod-123456"

  - name: gcp_data_exfiltration
    log_type: gcp_audit_logs
    stream_name: "Custom-GCPAuditLogsDemo_CL"
    description: "Simulate GCS/BigQuery data exfiltration — mass object reads, export jobs"
    count: 40
    parameters:
      event_type: "data_exfiltration"

  - name: gcp_security_tampering
    log_type: gcp_audit_logs
    stream_name: "Custom-GCPAuditLogsDemo_CL"
    description: "Simulate firewall rule deletion, audit log sink removal"
    count: 20
    parameters:
      event_type: "security_tampering"

  - name: gcp_compute_abuse
    log_type: gcp_audit_logs
    stream_name: "Custom-GCPAuditLogsDemo_CL"
    description: "Simulate launching GPU instances for crypto-mining in unusual zones"
    count: 15
    parameters:
      event_type: "compute_abuse"

  - name: gcp_brute_force_auth
    log_type: gcp_audit_logs
    stream_name: "Custom-GCPAuditLogsDemo_CL"
    description: "Simulate brute-force authentication failures against GCP"
    count: 50
    parameters:
      event_type: "credential_brute_force"
      source_ip: "203.0.113.91"
